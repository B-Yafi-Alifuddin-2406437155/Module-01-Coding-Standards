<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Payment Admin Detail</title>
    <link href="https://stackpath.bootstrapcdn.com/bootstrap/4.1.3/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container my-2">
    <h2>Payment Admin Detail</h2>
    <p th:text="'ID: ' + ${payment.id}"></p>
    <p th:text="'Method: ' + ${payment.method}"></p>
    <p th:text="'Status: ' + ${payment.status}"></p>

    <form th:action="@{/payment/admin/set-status/{id}(id=${payment.id})}" method="post">
        <div class="form-group">
            <label for="statusSelect">Status</label>
            <select id="statusSelect" name="status" class="form-control mb-4 col-4">
                <option value="SUCCESS">SUCCESS</option>
                <option value="REJECTED">REJECTED</option>
            </select>
        </div>
        <button type="submit" class="btn btn-primary">Update Status</button>
    </form>
</div>
</body>
</html>
