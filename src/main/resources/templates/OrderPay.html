<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Pay Order</title>
    <link href="https://stackpath.bootstrapcdn.com/bootstrap/4.1.3/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container">
    <h3>Pay Order</h3>
    <p>Order ID: <span id="orderIdText" th:text="${order.id}"></span></p>

    <form th:action="@{/order/pay/{id}(id=${order.id})}" method="post">
        <div class="form-group">
            <label for="methodSelect">Payment Method</label>
            <select id="methodSelect" name="method" class="form-control mb-4 col-4">
                <option value="VOUCHER_CODE">VOUCHER_CODE</option>
                <option value="CASH_ON_DELIVERY">CASH_ON_DELIVERY</option>
            </select>
        </div>

        <div class="form-group">
            <label for="voucherCodeInput">Voucher Code</label>
            <input type="text" class="form-control mb-4 col-4" id="voucherCodeInput" name="voucherCode">
        </div>

        <div class="form-group">
            <label for="addressInput">Address</label>
            <input type="text" class="form-control mb-4 col-4" id="addressInput" name="address">
        </div>

        <div class="form-group">
            <label for="deliveryFeeInput">Delivery Fee</label>
            <input type="text" class="form-control mb-4 col-4" id="deliveryFeeInput" name="deliveryFee">
        </div>

        <button type="submit" class="btn btn-primary">Pay</button>
    </form>
</div>
</body>
</html>
